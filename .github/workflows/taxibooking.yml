name: Taxi-Booking Real-Time Project

on:
    push:
        branches: 
            - main
    workflow_dispatch:
      
jobs:
  build:
    name: runs on ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: clean package
        run: mvn clean 
        working-directory: ./taxi-booking
      - name: Test Package
        run: mvn test
        working-directory: ./taxi-booking
      - name: build package
        run: mvn package
        working-directory: ./taxi-booking
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taxi-booking-war
          path: taxi-booking/target/taxi-booking-1.0.1.war
      - name: Build Docker Image
        run: docker build -t taxi-booking-app .
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Image
        run: |
           docker tag taxi-booking-app qualitygroup/taxi-booking:latest
           docker push qualitygroup/taxi-booking:latest