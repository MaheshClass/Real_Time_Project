name: Taxi-Booking Real-Time Project

on:
    push:
        branches: 
            - main
    workflow_dispatch:
      
jobs:
  build:
    name: runs on ubuntu-latest
    runs-on: ubuntu-latest
    permissions:
      security-events: "read"
      contents: "read"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
         languages: java
         build-mode: autobuild
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
         distribution: temurin
         java-version: 17
      - name: clean package
        run: mvn -B clean install --file taxi-booking/pom.xml
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taxi-booking-war
          path: taxi-booking/target/taxi-booking-1.0.1.war
      - name: Build Docker Image
        run: docker build -t taxi-booking-app ./taxi-booking
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
         image-ref: taxi-booking-app
      - name: Docker-login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker Images
        run: |
           docker tag taxi-booking-app qualitygroup/taxi-booking:latest
           docker push qualitygroup/taxi-booking:latest