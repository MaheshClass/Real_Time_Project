name: Taxi-Booking Real-Time Project

on:
    push:
        branches: 
            - main
            - dev
    workflow_dispatch:
      
jobs:
  build:
    name: runs on ubuntu-latest
    runs-on: ubuntu-latest
    permissions:
      security-events: "write"
      contents: "read"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
            # DEV ENVIRONMENT
      - name: Deploy to DEV Namespace
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "Code pushed to DEV branch"
          echo "Deploying to DEV namespace in Kubernetes cluster"
          echo "DEV environment running"

      # PROD ENVIRONMENT
      - name: Deploy to PROD Namespace
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Code pushed to MAIN branch"
          echo "Deploying to PROD namespace in Kubernetes cluster"
          echo "PROD environment running"
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
         languages: java
         build-mode: autobuild
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
         distribution: temurin
         java-version: 17
      - name: clean package
        run: mvn -B clean install --file taxi-booking/pom.xml
      - name: Run JUnit test cases
        run: echo " Junit test cases runs succesfully"
      - name: Run Regression Test cases
        run: echo " Regression test cases runs succesfully" 
      - name: Run System Test cases
        run: echo " System test cases runs succesfully"
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taxi-booking-war
          path: taxi-booking/target/taxi-booking-1.0.1.war
      - name: Build Docker Image
        run: docker build -t taxi-booking-app .
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
         image-ref: taxi-booking-app
      - name: Docker-login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker Images
        run: |
           docker tag taxi-booking-app qualitygroup/taxi-booking:latest
           docker push qualitygroup/taxi-booking:latest
      - name: Set Namespace
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "NAMESPACE=dev" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "NAMESPACE=prod" >> $GITHUB_ENV
          fi
      - name: Deploy to Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            BRANCH=${{ github.ref_name }}

            if [ "$BRANCH" = "dev" ]; then
              NAMESPACE="dev"
            elif [ "$BRANCH" = "main" ]; then
              NAMESPACE="prod"
            fi

            echo "Deploying to namespace: $NAMESPACE"

            cd /home/ubuntu

            if [ ! -d "sample/.git" ]; then
              rm -rf sample
              git clone https://github.com/MaheshClass/Real_Time_Project.git sample
              cd sample
            else
              cd sample
              git pull
            fi

            echo "Creating namespace if not exists"
            kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

            echo "Deploying application"
            kubectl apply -f deployment.yaml -n $NAMESPACE
            kubectl apply -f service.yaml -n $NAMESPACE

            echo "Deployment completed in namespace $NAMESPACE"
            